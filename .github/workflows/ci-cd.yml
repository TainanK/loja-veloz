name: CI/CD Loja Veloz

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/lojaveloz

jobs:

  test:
    name: testes e lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, pedidos, pagamentos, estoque]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: services/${{ matrix.service }}/app/requirements.txt

      - name: instalar dependencias
        run: |
          pip install -r services/${{ matrix.service }}/app/requirements.txt
          pip install flake8

      - name: rodar lint
        run: flake8 services/${{ matrix.service }}/app/ --max-line-length=120

  build-and-push:
    name: build e push da imagem
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [api-gateway, pedidos, pagamentos, estoque]
    steps:
      - uses: actions/checkout@v4

      - name: login no registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: gerar tags da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: build e push
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: deploy no kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-kubectl@v3

      - name: aplicar manifests no cluster
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          echo "$KUBE_CONFIG" | base64 -d > kubeconfig.yaml
          export KUBECONFIG=kubeconfig.yaml
          kubectl apply -f k8s/configmaps/
          kubectl apply -f k8s/secrets/
          kubectl apply -f k8s/deployments/
          kubectl apply -f k8s/services/
          kubectl rollout status deployment/api-gateway -n lojaveloz
          kubectl rollout status deployment/pedidos -n lojaveloz
